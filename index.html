<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maze Game Levels</title>
    <link rel="manifest" href="/manifest.json">
</head>
<body>
    <div id="app">
        <canvas id="game-canvas"></canvas>
        <div id="ui-layer">
            <div id="audio-unlock-overlay" class="hidden">
                <div class="unlock-prompt">
                    <h2>🔊 Audio Ready</h2>
                    <p>Click anywhere to enable game audio</p>
                </div>
            </div>
            <div id="level-select-screen"></div>
            <div id="game-hud" class="hidden">
                <div id="game-ui">
                    <span id="level-display">Level: 1</span>
                    <span id="timer-display">Time: 00:00</span>
                </div>
                <button id="back-btn">Back to Menu</button>
                <button id="settings-btn">⚙️</button>
            </div>
            <div id="modal-overlay" class="hidden">
                <div id="victory-modal" class="modal hidden">
                    <h2>Level Complete!</h2>
                    <div class="stars-display"></div>
                    <p>Time: <span class="time-result"></span></p>
                    <button id="next-level-btn">Next Level</button>
                    <button id="menu-btn">Menu</button>
                </div>
                <div id="game-over-modal" class="modal hidden">
                    <h2>Game Over</h2>
                    <p>Try again!</p>
                    <button id="retry-btn">Retry</button>
                    <button id="menu-btn-fail">Menu</button>
                </div>
                <div id="settings-modal" class="modal hidden">
                    <h2>Audio Settings</h2>
                    <div class="settings-content">
                        <div class="setting-row">
                            <label for="music-volume">Music Volume</label>
                            <input type="range" id="music-volume" min="0" max="100" value="50" />
                            <span id="music-volume-value">50%</span>
                        </div>
                        <div class="setting-row">
                            <label for="sfx-volume">SFX Volume</label>
                            <input type="range" id="sfx-volume" min="0" max="100" value="80" />
                            <span id="sfx-volume-value">80%</span>
                        </div>
                        <div class="setting-row">
                            <label for="mute-toggle">Mute All</label>
                            <input type="checkbox" id="mute-toggle" />
                        </div>
                    </div>
                    <button id="settings-close-btn">Close</button>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="/src/js/main.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then(registration => {
                        console.log('SW registered: ', registration);
                    })
                    .catch(registrationError => {
                        console.log('SW registration failed: ', registrationError);
                    });
            });
        }
    </script>
</body>
</html>
